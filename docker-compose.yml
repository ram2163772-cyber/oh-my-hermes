services:
  oh-my-hermes:
    build: .
    container_name: oh-my-hermes
    environment:
      # Set TEST_MODE=1 to run smoke tests instead of interactive setup
      - TEST_MODE=${TEST_MODE:-0}
      # Optional: pre-set credentials (copy .env.example to .env and fill in)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - VERCEL_TOKEN=${VERCEL_TOKEN:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      # Persist Hermes config, memory, and skills across container restarts
      - hermes-data:/root/.hermes
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  hermes-data:
